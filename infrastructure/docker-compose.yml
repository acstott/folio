version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: folio-postgres
    environment:
      POSTGRES_DB: folio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - folio_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d folio"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  folio_pgdata:
